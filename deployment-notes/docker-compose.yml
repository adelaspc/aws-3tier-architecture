services:
  deployment-notes-app:
    build:
      context: .
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DEPLOYMENT_NOTES_ENV: ${DEPLOYMENT_NOTES_ENV:-development}
      DEPLOYMENT_NOTES_SERVE_FRONTEND: ${DEPLOYMENT_NOTES_SERVE_FRONTEND:-true}
      DEPLOYMENT_NOTES_DATABASE_URL: mysql+pymysql://${DEPLOYMENT_NOTES_MYSQL_USER:-deployment_notes_user}:${DEPLOYMENT_NOTES_MYSQL_PASSWORD:?set DEPLOYMENT_NOTES_MYSQL_PASSWORD in .env}@db:3306/${DEPLOYMENT_NOTES_MYSQL_DATABASE:-deployment_notes}
      FLASK_APP: wsgi.py
      PORT: ${PORT:-5000}
    ports:
      - "${DEPLOYMENT_NOTES_APP_PORT:-5001}:${PORT:-5000}"

  db:
    image: mysql:8.4
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${DEPLOYMENT_NOTES_MYSQL_DATABASE:-deployment_notes}
      MYSQL_USER: ${DEPLOYMENT_NOTES_MYSQL_USER:-deployment_notes_user}
      MYSQL_PASSWORD: ${DEPLOYMENT_NOTES_MYSQL_PASSWORD:?set DEPLOYMENT_NOTES_MYSQL_PASSWORD in .env}
      MYSQL_ROOT_PASSWORD: ${DEPLOYMENT_NOTES_MYSQL_ROOT_PASSWORD:?set DEPLOYMENT_NOTES_MYSQL_ROOT_PASSWORD in .env}
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    ports:
      - "${DEPLOYMENT_NOTES_MYSQL_PORT:-3307}:3306"
    volumes:
      - deployment_notes_mysql_data:/var/lib/mysql

volumes:
  deployment_notes_mysql_data:
