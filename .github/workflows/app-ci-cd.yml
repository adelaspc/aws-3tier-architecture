name: App CI/CD

on:
  pull_request:
    paths:
      - "deployment-notes/**"
      - ".github/workflows/app-ci-cd.yml"
  push:
    paths:
      - "deployment-notes/**"
      - ".github/workflows/app-ci-cd.yml"
      - "scripts/wait-asg-refresh.sh"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  APP_DIR: deployment-notes
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  BACKEND_IMAGE_TAG: backend-${{ github.sha }}
  FRONTEND_IMAGE_TAG: frontend-${{ github.sha }}

jobs:
  test:
    name: Test application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: deployment-notes/requirements-dev.txt

      - name: Install backend dependencies
        working-directory: ${{ env.APP_DIR }}
        run: pip install -r requirements-dev.txt

      - name: Run backend tests
        working-directory: ${{ env.APP_DIR }}
        run: pytest -q

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: deployment-notes/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ${{ env.APP_DIR }}/frontend
        run: npm ci

      - name: Build frontend
        working-directory: ${{ env.APP_DIR }}/frontend
        run: npm run build

  build-and-deploy:
    name: Build images and deploy
    runs-on: ubuntu-latest
    needs: test
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    environment: app-dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_APP_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.APP_DIR }}
          file: ${{ env.APP_DIR }}/backend/Dockerfile
          push: true
          tags: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.BACKEND_IMAGE_TAG }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.APP_DIR }}
          file: ${{ env.APP_DIR }}/frontend/Dockerfile
          push: true
          tags: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.FRONTEND_IMAGE_TAG }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

      - name: Run database migrations through SSM
        env:
          APP_ENV: ${{ vars.APP_ENV }}
          APP_ASG_NAME: ${{ vars.APP_ASG_NAME }}
          BACKEND_CONTAINER_NAME: ${{ vars.BACKEND_CONTAINER_NAME }}
          DATABASE_URL_PARAMETER_NAME: ${{ vars.DATABASE_URL_PARAMETER_NAME }}
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          set -euo pipefail

          : "${APP_ENV:=dev}"
          : "${BACKEND_CONTAINER_NAME:=deployment-notes-backend}"
          : "${APP_ASG_NAME:?APP_ASG_NAME GitHub variable is required}"
          : "${DATABASE_URL_PARAMETER_NAME:?DATABASE_URL_PARAMETER_NAME GitHub variable is required}"

          BACKEND_IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${BACKEND_IMAGE_TAG}"

          INSTANCE_IDS="$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names "${APP_ASG_NAME}" \
            --query "AutoScalingGroups[0].Instances[?LifecycleState=='InService' && HealthStatus=='Healthy'].InstanceId" \
            --output text)"

          if [ -z "${INSTANCE_IDS}" ] || [ "${INSTANCE_IDS}" = "None" ]; then
            echo "No healthy InService instances found in ${APP_ASG_NAME}"
            exit 1
          fi

          MIGRATION_INSTANCE_ID=""
          for instance_id in ${INSTANCE_IDS}; do
            ping_status="$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=${instance_id}" \
              --query "InstanceInformationList[0].PingStatus" \
              --output text 2>/dev/null || true)"

            if [ "${ping_status}" = "Online" ]; then
              MIGRATION_INSTANCE_ID="${instance_id}"
              break
            fi
          done

          if [ -z "${MIGRATION_INSTANCE_ID}" ]; then
            echo "No SSM Online backend instance found in ${APP_ASG_NAME}"
            exit 1
          fi

          echo "Running migration on ${MIGRATION_INSTANCE_ID} with ${BACKEND_IMAGE_URI}"

          jq -n \
            --arg aws_region "${AWS_REGION}" \
            --arg ecr_registry "${ECR_REGISTRY}" \
            --arg backend_image_uri "${BACKEND_IMAGE_URI}" \
            --arg backend_container_name "${BACKEND_CONTAINER_NAME}" \
            --arg app_env "${APP_ENV}" \
            --arg database_url_parameter_name "${DATABASE_URL_PARAMETER_NAME}" \
            '{
              commands: [
                "set -euo pipefail",
                "aws ecr get-login-password --region \($aws_region) | docker login --username AWS --password-stdin \($ecr_registry)",
                "docker pull \($backend_image_uri)",
                "docker rm -f \($backend_container_name)-migration 2>/dev/null || true",
                "docker run --rm --name \($backend_container_name)-migration -e DEPLOYMENT_NOTES_ENV=\($app_env) -e DEPLOYMENT_NOTES_SERVE_FRONTEND=false -e DEPLOYMENT_NOTES_DATABASE_URL_SSM_PARAM=\($database_url_parameter_name) -e AWS_REGION=\($aws_region) -e AWS_DEFAULT_REGION=\($aws_region) -e FLASK_APP=wsgi.py \($backend_image_uri) flask --app wsgi.py db upgrade"
              ]
            }' > commands.json

          COMMAND_ID="$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --instance-ids "${MIGRATION_INSTANCE_ID}" \
            --comment "deployment-notes migration ${GITHUB_SHA}" \
            --parameters file://commands.json \
            --query "Command.CommandId" \
            --output text)"

          for attempt in $(seq 1 60); do
            STATUS="$(aws ssm get-command-invocation \
              --command-id "${COMMAND_ID}" \
              --instance-id "${MIGRATION_INSTANCE_ID}" \
              --query "Status" \
              --output text 2>/dev/null || true)"

            case "${STATUS}" in
              Success)
                echo "Migration completed successfully"
                exit 0
                ;;
              Failed|Cancelled|TimedOut|Cancelling)
                echo "Migration failed with status ${STATUS}"
                aws ssm get-command-invocation \
                  --command-id "${COMMAND_ID}" \
                  --instance-id "${MIGRATION_INSTANCE_ID}" \
                  --query "{Status:Status,Stdout:StandardOutputContent,Stderr:StandardErrorContent}" \
                  --output json
                exit 1
                ;;
            esac

            echo "Migration status: ${STATUS:-Pending}; waiting..."
            sleep 10
          done

          echo "Timed out waiting for migration command ${COMMAND_ID}"
          exit 1

      - name: Update image tag parameters
        env:
          BACKEND_IMAGE_TAG_PARAMETER_NAME: ${{ vars.BACKEND_IMAGE_TAG_PARAMETER_NAME }}
          FRONTEND_IMAGE_TAG_PARAMETER_NAME: ${{ vars.FRONTEND_IMAGE_TAG_PARAMETER_NAME }}
        run: |
          set -euo pipefail
          : "${BACKEND_IMAGE_TAG_PARAMETER_NAME:?BACKEND_IMAGE_TAG_PARAMETER_NAME GitHub variable is required}"
          : "${FRONTEND_IMAGE_TAG_PARAMETER_NAME:?FRONTEND_IMAGE_TAG_PARAMETER_NAME GitHub variable is required}"

          aws ssm put-parameter \
            --name "${BACKEND_IMAGE_TAG_PARAMETER_NAME}" \
            --type String \
            --value "${BACKEND_IMAGE_TAG}" \
            --overwrite

          aws ssm put-parameter \
            --name "${FRONTEND_IMAGE_TAG_PARAMETER_NAME}" \
            --type String \
            --value "${FRONTEND_IMAGE_TAG}" \
            --overwrite

      - name: Refresh app tier
        env:
          APP_ASG_NAME: ${{ vars.APP_ASG_NAME }}
        run: |
          set -euo pipefail
          : "${APP_ASG_NAME:?APP_ASG_NAME GitHub variable is required}"
          ./scripts/wait-asg-refresh.sh "${APP_ASG_NAME}"

      - name: Refresh web tier
        env:
          WEB_ASG_NAME: ${{ vars.WEB_ASG_NAME }}
        run: |
          set -euo pipefail
          : "${WEB_ASG_NAME:?WEB_ASG_NAME GitHub variable is required}"
          ./scripts/wait-asg-refresh.sh "${WEB_ASG_NAME}"
